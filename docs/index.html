<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice Agent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Invoice Agent</p>
      <h1>&#21457;&#31080;&#20998;&#26512;&#21161;&#25163;</h1>
    </div>
    <button id="exportJson" class="ghost" type="button">&#23548;&#20986; JSON</button>
  </header>

  <main>
    <section class="workspace">
      <div class="upload-panel">
        <label class="dropzone" for="fileInput" id="dropzone">
          <span class="upload-icon">+</span>
          <strong>&#19978;&#20256;&#21457;&#31080;&#25991;&#20214;</strong>
          <span>&#25903;&#25345; .pdf / .txt / .md&#65307;&#25195;&#25551;&#22270;&#29255;&#22411; PDF &#38656;&#35201; OCR</span>
        </label>
        <input id="fileInput" type="file" multiple accept=".pdf,.txt,.md,application/pdf,text/plain,text/markdown">
        <div class="manual-entry">
          <div class="field-head">
            <label for="manualText">&#31896;&#36148;&#21457;&#31080;&#20869;&#23481;</label>
            <button id="analyzeManual" type="button">&#20998;&#26512;&#25991;&#26412;</button>
          </div>
          <textarea id="manualText" placeholder="&#22995;&#21517;&#65306;&#24352;&#19977;&#10;&#39033;&#30446;&#65306;&#22269;&#20869;&#26426;&#31080;&#10;&#34892;&#31243;&#65306;2026&#24180;7&#26376;1&#26085; &#19978;&#28023; &#21040; &#21271;&#20140;&#10;&#37329;&#39069;&#65306;980&#20803;"></textarea>
        </div>
      </div>

      <aside class="summary-panel">
        <p class="label">&#21512;&#35745;&#37329;&#39069;</p>
        <div id="totalAmount" class="total">0.00 &#20803;</div>
        <div class="metric-grid">
          <div><span id="invoiceCount">0</span><small>&#21457;&#31080;&#25968;</small></div>
          <div><span id="issueCount">0</span><small>&#38382;&#39064;&#25968;</small></div>
        </div>
        <p id="tripSummary" class="trip-summary"></p>
      </aside>
    </section>

    <section class="results-section">
      <div class="section-head">
        <h2>&#20998;&#26512;&#32467;&#26524;</h2>
        <button id="clearAll" class="ghost" type="button">&#28165;&#31354;</button>
      </div>
      <div id="results" class="results empty"></div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
  <script src="app.js?v=20260710-toll-11"></script>
</body>
</html>
